# Cloud Build Configuration: Build & Store Image in Artifact Registry (Without Deploying)

steps:
  # Step 1: Build the unified Docker container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/gaming-app:${_TAG}'
      - '.'

  # Step 2: Push the tagged container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/gaming-app:${_TAG}'

# Store images in Artifact Registry (Build artifacts registration)
images:
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/gaming-app:${_TAG}'

substitutions:
  _LOCATION: 'us-central1'
  _REPOSITORY: 'data-cloud-ai-demos'
  _TAG: 'latest'
